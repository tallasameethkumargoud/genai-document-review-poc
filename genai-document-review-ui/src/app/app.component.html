<div class="container">

  <div class="content">
    <div class="left-side">
      <h1>GenAI Document Review</h1>
      <p>Welcome to the GenAI Document Review application!</p>
    </div>

    <div class="right-side" *ngIf="isLoggedIn()">
      <div class="pill-group">
        <a class="pill"
           routerLink="/dashboard"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }">
          Dashboard
        </a>

        <a class="pill"
           routerLink="/loan-officer-approval"
           routerLinkActive="active">
          Loan Officer Approval
        </a>
      </div>
    </div>
  </div>

  <div class="logout" *ngIf="isLoggedIn()">
    <button (click)="logout()">Logout</button>
  </div>

  <div *ngIf="!isLoggedIn()">
    <app-login></app-login>
  </div>

  <div class="main-content" *ngIf="isLoggedIn()">
    <router-outlet></router-outlet>
  </div>

</div>
